    <style>
        .page-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #0a0a1a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .page-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 640px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.6rem;
            color: var(--color-primary);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .divider-line {
            height: 3px;
            width: 60px;
            background: var(--color-primary);
            border-radius: 2px;
            margin-bottom: 30px;
        }

        /* IUS Block */
        .ius-block {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 36px 32px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 30px;
            align-items: center;
            margin-bottom: 50px;
        }

        @media (max-width: 600px) {
            .ius-block {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }

        .ius-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            flex-shrink: 0;
        }

        .ius-info h3 {
            font-size: 1.25rem;
            margin-bottom: 8px;
            color: var(--color-accent);
        }

        .ius-info p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.7;
        }

        /* Solidarity Cards */
        .solidarity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .solidarity-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 28px 24px;
            transition: var(--transition-smooth);
            border-top: 3px solid var(--color-primary);
        }

        .solidarity-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .solidarity-card .s-flag {
            font-size: 2.5rem;
            margin-bottom: 14px;
        }

        .solidarity-card h3 {
            font-size: 1.05rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .solidarity-card p {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.65;
        }

        .solidarity-card .s-tag {
            display: inline-block;
            margin-top: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(211, 26, 39, 0.12);
            color: var(--color-primary);
            font-size: 0.75rem;
            border: 1px solid rgba(211, 26, 39, 0.3);
        }

        /* Statement Block */
        .statement-block {
            background: linear-gradient(135deg, rgba(211, 26, 39, 0.08) 0%, rgba(255, 189, 9, 0.05) 100%);
            border: 1px solid rgba(211, 26, 39, 0.2);
            border-radius: var(--border-radius-md);
            padding: 40px 36px;
            margin-bottom: 60px;
        }

        .statement-block blockquote {
            font-size: 1.15rem;
            line-height: 1.85;
            color: var(--text-primary);
            font-style: italic;
            margin: 0 0 18px;
            border-left: 4px solid var(--color-primary);
            padding-left: 20px;
        }

        .statement-block .attrib {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Timeline */
        .intl-timeline {
            position: relative;
            padding-left: 28px;
            margin-bottom: 60px;
        }

        .intl-timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 28px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 6px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-primary);
            border: 2px solid var(--bg-body, #0c0d10);
        }

        .timeline-item .t-year {
            font-size: 0.8rem;
            color: var(--color-accent);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .timeline-item h4 {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .timeline-item p {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
