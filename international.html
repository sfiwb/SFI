    <!-- Main Stylesheets -->
    
    
    <style>
        .page-hero {
            background: linear-gradient(135deg, #0f1016 0%, #1e0b12 50%, #0b0c16 100%);
            padding: 130px 0 90px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .page-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(211, 26, 39, 0.18), transparent 60%);
            pointer-events: none;
        }

        .page-hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.2rem);
            color: var(--color-primary);
            font-weight: 800;
            margin-bottom: 16px;
            text-shadow: 0 0 25px rgba(211, 26, 39, 0.4);
        }

        .page-hero p {
            color: var(--text-muted);
            font-size: 1.25rem;
            max-width: 780px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .section-title {
            font-size: 1.80rem;
            color: var(--color-primary);
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .divider-line {
            height: 3px;
            width: 80px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            border-radius: 2px;
            margin-bottom: 35px;
        }

        /* Archive Controls */
        .archive-controls {
            background: rgba(18, 20, 26, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--border-radius-md);
            padding: 28px;
            margin-bottom: 45px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .search-box {
            position: relative;
            margin-bottom: 22px;
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .search-box input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            background: rgba(8, 9, 12, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-sm);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition-smooth);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 18px rgba(211, 26, 39, 0.35);
        }

        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .filter-btn {
            padding: 10px 22px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            color: var(--text-muted);
            font-size: 0.92rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .filter-btn:hover {
            background: rgba(211, 26, 39, 0.12);
            color: var(--color-primary);
            border-color: rgba(211, 26, 39, 0.3);
        }

        .filter-btn.active {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
            box-shadow: 0 4px 15px rgba(211, 26, 39, 0.4);
        }

        /* Solidarity Grid & Cards */
        .solidarity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 32px;
            margin-bottom: 60px;
        }

        .solidarity-card {
            background: rgba(18, 20, 26, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--border-radius-md);
            padding: 34px 30px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-top: 4px solid var(--color-primary);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .solidarity-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(211, 26, 39, 0.18), 0 5px 15px rgba(0,0,0,0.4);
            border-color: rgba(211, 26, 39, 0.35);
        }

        .solidarity-card .s-flag {
            font-size: 3.2rem;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .solidarity-card h3 {
            font-size: 1.35rem;
            margin-bottom: 14px;
            color: var(--text-primary);
            font-weight: 700;
            line-height: 1.4;
        }

        .solidarity-card p {
            font-size: 0.94rem;
            color: var(--text-muted);
            line-height: 1.75;
            margin-bottom: 22px;
            flex-grow: 1;
        }

        /* Stat Indicator Meter Bar */
        .card-stat-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: var(--border-radius-sm);
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .card-stat-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-meter {
            margin-bottom: 10px;
        }

        .stat-meter:last-child {
            margin-bottom: 0;
        }

        .stat-label-wrap {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .stat-label-wrap span.val {
            font-weight: bold;
            color: var(--color-primary);
        }

        .stat-bar-container {
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            border-radius: 4px;
            width: 0; /* Animated/filled dynamically */
            transition: width 1s ease-in-out;
        }

        /* Button to open Modal */
        .read-more-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            background: rgba(211, 26, 39, 0.08);
            border: 1px solid rgba(211, 26, 39, 0.25);
            border-radius: var(--border-radius-sm);
            color: var(--color-primary);
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-decoration: none;
            margin-top: auto;
        }

        .read-more-btn:hover {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
            box-shadow: 0 4px 15px rgba(211, 26, 39, 0.3);
        }

        .solidarity-card .s-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(211, 26, 39, 0.1);
            color: var(--color-primary);
            font-size: 0.78rem;
            font-weight: 600;
            border: 1px solid rgba(211, 26, 39, 0.25);
            margin-bottom: 16px;
            align-self: flex-start;
        }

        /* Color Coding Themes */
        .solidarity-card.theme-middle-east { border-top-color: var(--color-primary); }
        .solidarity-card.theme-europe { border-top-color: #3b82f6; }
        .solidarity-card.theme-europe .read-more-btn { color: #3b82f6; border-color: rgba(59, 130, 246, 0.25); background: rgba(59, 130, 246, 0.08); }
        .solidarity-card.theme-europe .read-more-btn:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .solidarity-card.theme-europe .stat-label-wrap span.val { color: #3b82f6; }
        .solidarity-card.theme-europe .stat-bar-fill { background: linear-gradient(90deg, #3b82f6, #00d2ff); }
        .solidarity-card.theme-europe .s-tag { color: #3b82f6; border-color: rgba(59, 130, 246, 0.25); background: rgba(59, 130, 246, 0.1); }

        .solidarity-card.theme-latin-america { border-top-color: #eab308; }
        .solidarity-card.theme-latin-america .read-more-btn { color: #eab308; border-color: rgba(234, 179, 8, 0.25); background: rgba(234, 179, 8, 0.08); }
        .solidarity-card.theme-latin-america .read-more-btn:hover { background: #eab308; color: #111; border-color: #eab308; box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3); }
        .solidarity-card.theme-latin-america .stat-label-wrap span.val { color: #eab308; }
        .solidarity-card.theme-latin-america .stat-bar-fill { background: linear-gradient(90deg, #eab308, #ffd700); }
        .solidarity-card.theme-latin-america .s-tag { color: #eab308; border-color: rgba(234, 179, 8, 0.25); background: rgba(234, 179, 8, 0.1); }

        .solidarity-card.theme-south-asia-africa { border-top-color: #10b981; }
        .solidarity-card.theme-south-asia-africa .read-more-btn { color: #10b981; border-color: rgba(16, 185, 129, 0.25); background: rgba(16, 185, 129, 0.08); }
        .solidarity-card.theme-south-asia-africa .read-more-btn:hover { background: #10b981; color: #fff; border-color: #10b981; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .solidarity-card.theme-south-asia-africa .stat-label-wrap span.val { color: #10b981; }
        .solidarity-card.theme-south-asia-africa .stat-bar-fill { background: linear-gradient(90deg, #10b981, #05ffd2); }
        .solidarity-card.theme-south-asia-africa .s-tag { color: #10b981; border-color: rgba(16, 185, 129, 0.25); background: rgba(16, 185, 129, 0.1); }

        /* Premium Custom Modal Dialog */
        .custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(6, 8, 12, 0.85);
            backdrop-filter: blur(18px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .custom-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .custom-modal-box {
            background: rgba(18, 22, 28, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-md);
            max-width: 820px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 30px rgba(211, 26, 39, 0.15);
            transform: scale(0.92) translateY(20px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .custom-modal-overlay.active .custom-modal-box {
            transform: scale(1) translateY(0);
        }

        .custom-modal-header {
            padding: 24px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 12, 16, 0.5);
        }

        .custom-modal-header h2 {
            font-size: 1.45rem;
            color: #fff;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close-btn:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }

        /* Modal Sub-Tabs Navigation */
        .modal-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0 30px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
            -ms-overflow-style: none; /* Hide scrollbar for IE/Edge */
        }
        .modal-tabs::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome/Safari/Opera */
        }

        .modal-tab-link {
            padding: 16px 20px;
            color: var(--text-muted);
            font-size: 0.92rem;
            font-weight: 600;
            border: none;
            background: transparent;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .modal-tab-link:hover {
            color: #fff;
        }

        .modal-tab-link.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        /* Modal body & panels */
        .custom-modal-body {
            padding: 30px;
            overflow-y: auto;
            flex-grow: 1;
            line-height: 1.8;
            font-size: 0.98rem;
            color: var(--text-primary);
        }

        .modal-panel {
            display: none;
        }

        .modal-panel.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-data-table th, .modal-data-table td {
            padding: 12px 18px;
            text-align: left;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-data-table th {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-weight: 700;
        }

        .modal-data-table tr:last-child td {
            border-bottom: none;
        }

        .modal-stat-value {
            font-weight: 700;
            color: var(--color-primary);
        }

        .modal-resolution-card {
            background: rgba(211, 26, 39, 0.06);
            border: 1px solid rgba(211, 26, 39, 0.25);
            border-radius: var(--border-radius-sm);
            padding: 20px;
            margin-top: 15px;
            border-left: 5px solid var(--color-primary);
        }

        .modal-resolution-card blockquote {
            font-style: italic;
            margin: 0;
            color: #fff;
        }

        .custom-modal-footer {
            padding: 20px 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: flex-end;
            background: rgba(10, 12, 16, 0.4);
        }

        /* IUS Block */
        .ius-block {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 36px 32px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 30px;
            align-items: center;
            margin-bottom: 50px;
            transition: var(--transition-smooth);
        }

        .ius-block:hover {
            border-color: rgba(211, 26, 39, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        @media (max-width: 600px) {
            .ius-block {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }

        .ius-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .ius-info h3 {
            font-size: 1.35rem;
            margin-bottom: 8px;
            color: var(--color-accent);
            font-weight: 600;
        }

        .ius-info p {
            font-size: 0.98rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 0;
        }

        /* State Committee Resolution Block */
        .resolution-block {
            background: linear-gradient(135deg, rgba(211, 26, 39, 0.12) 0%, rgba(20, 22, 28, 0.95) 50%, rgba(255, 189, 9, 0.04) 100%);
            border: 2px solid rgba(211, 26, 39, 0.3);
            border-radius: var(--border-radius-md);
            padding: 50px 40px;
            margin-bottom: 60px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(211, 26, 39, 0.1);
        }

        .resolution-block::before {
            content: '★';
            position: absolute;
            right: -30px;
            bottom: -50px;
            font-size: 15rem;
            color: rgba(211, 26, 39, 0.04);
            font-weight: 900;
            pointer-events: none;
        }

        .resolution-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 24px;
        }

        .resolution-star {
            width: 45px;
            height: 45px;
            background: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            box-shadow: 0 0 15px rgba(211, 26, 39, 0.5);
        }

        .resolution-title-text h3 {
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .resolution-title-text p {
            font-size: 0.85rem;
            color: var(--color-primary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 0;
        }

        .resolution-block blockquote {
            font-size: 1.2rem;
            line-height: 1.9;
            color: var(--text-primary);
            font-weight: 500;
            margin: 0 0 24px;
            border-left: 5px solid var(--color-primary);
            padding-left: 24px;
        }

        .resolution-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .resolution-sign {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .resolution-sign strong {
            color: var(--text-primary);
        }

        .resolution-slogan {
            font-size: 1rem;
            font-weight: 700;
            color: var(--color-primary);
            text-shadow: 0 0 10px rgba(211, 26, 39, 0.2);
        }

        /* Timeline */
        .intl-timeline {
            position: relative;
            padding-left: 28px;
            margin-bottom: 60px;
        }

        .intl-timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 28px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 6px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-primary);
            border: 2px solid var(--bg-body, #0c0d10);
        }

        .timeline-item .t-year {
            font-size: 0.8rem;
            color: var(--color-accent);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .timeline-item h4 {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .timeline-item p {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Mobile Responsive adjustments for Custom Modal Popup */
        @media (max-width: 768px) {
            .custom-modal-overlay {
                padding: 10px;
            }
            .custom-modal-box {
                max-height: 90vh;
            }
            .custom-modal-header {
                padding: 16px 20px;
            }
            .custom-modal-header h2 {
                font-size: 1.15rem;
                gap: 8px;
            }
            .modal-tabs {
                padding: 0 15px;
            }
            .modal-tab-link {
                padding: 12px 14px;
                font-size: 0.85rem;
                gap: 6px;
            }
            .custom-modal-body {
                padding: 20px;
                font-size: 0.92rem;
            }
            .custom-modal-footer {
                padding: 12px 20px;
            }
            .modal-data-table th, .modal-data-table td {
                padding: 8px 12px;
                font-size: 0.82rem;
            }
            .modal-resolution-card {
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .custom-modal-overlay {
                padding: 5px;
            }
            .custom-modal-box {
                max-height: 95vh;
            }
            .custom-modal-header {
                padding: 12px 15px;
            }
            .custom-modal-header h2 {
                font-size: 1.05rem;
            }
            .modal-tabs {
                padding: 0 10px;
            }
            .modal-tab-link {
                padding: 10px 12px;
                font-size: 0.8rem;
            }
            .custom-modal-body {
                padding: 15px;
            }
        }
