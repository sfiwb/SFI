    <!-- Main Stylesheets -->
    
    
    <style>
        .prog-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .prog-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .prog-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 640px;
            margin: 0 auto;
        }

        .prog-section {
            padding: 70px 0;
        }

        .prog-intro {
            text-align: center;
            max-width: 780px;
            margin: 0 auto 60px;
        }

        .prog-intro p {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.8;
            font-family: var(--font-body);
        }

        .prog-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .prog-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 30px 26px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .prog-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--color-primary);
        }

        .prog-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .prog-card-icon {
            font-size: 2.2rem;
            margin-bottom: 14px;
            display: block;
        }

        .prog-card h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin-bottom: 14px;
        }

        .prog-card ul {
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .prog-card ul li {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .prog-card ul li:last-child {
            border-bottom: none;
        }

        .prog-card ul li::before {
            content: '✦';
            color: var(--color-primary);
            font-size: 0.7rem;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .download-banner {
            background: linear-gradient(135deg, var(--color-primary) 0%, #8b0000 100%);
            border-radius: var(--border-radius-md);
            padding: 40px;
            text-align: center;
            margin-top: 20px;
        }

        .download-banner h3 {
            font-size: 1.4rem;
            color: #fff;
            font-family: var(--font-body);
            margin-bottom: 10px;
        }

        .download-banner p {
            color: rgba(255, 255, 255, 0.8);
            font-family: var(--font-body);
            margin-bottom: 24px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            color: var(--color-primary);
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1rem;
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            transition: var(--transition-smooth);
            border: 2px solid transparent;
        }

        .btn-download:hover {
            background: transparent;
            color: #fff;
            border-color: #fff;
        }

        .btn-download svg {
            width: 20px;
            height: 20px;
        }
    </style>
