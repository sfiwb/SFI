    <style>
        .const-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .const-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .const-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 640px;
            margin: 0 auto;
        }

        .const-section {
            padding: 70px 0;
        }

        .const-intro {
            text-align: center;
            max-width: 780px;
            margin: 0 auto 50px;
        }

        .const-intro p {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.8;
            font-family: var(--font-body);
        }

        .accordion {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 50px;
        }

        .accordion-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .accordion-item.open {
            border-color: var(--color-primary);
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            cursor: pointer;
            user-select: none;
            gap: 16px;
        }

        .accordion-header:hover {
            background: rgba(211, 26, 39, 0.05);
        }

        .accordion-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .accordion-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--color-primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            flex-shrink: 0;
        }

        .accordion-title h3 {
            font-size: 1.05rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin: 0;
        }

        .accordion-arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .accordion-item.open .accordion-arrow {
            transform: rotate(180deg);
            color: var(--color-primary);
        }

        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .accordion-item.open .accordion-body {
            max-height: 600px;
        }

        .accordion-content {
            padding: 0 24px 24px;
            border-top: 1px solid var(--border-color);
        }

        .accordion-content p {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            line-height: 1.8;
            margin: 16px 0 12px;
        }

        .accordion-content ul {
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .accordion-content ul li {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.6;
        }

        .accordion-content ul li:last-child {
            border-bottom: none;
        }

        .accordion-content ul li::before {
            content: '§';
            color: var(--color-primary);
            font-weight: 700;
            flex-shrink: 0;
            font-family: 'Outfit', sans-serif;
        }

        .download-banner {
            background: linear-gradient(135deg, var(--color-primary) 0%, #8b0000 100%);
            border-radius: var(--border-radius-md);
            padding: 40px;
            text-align: center;
        }

        .download-banner h3 {
            font-size: 1.4rem;
            color: #fff;
            font-family: var(--font-body);
            margin-bottom: 10px;
        }

        .download-banner p {
            color: rgba(255, 255, 255, 0.8);
            font-family: var(--font-body);
            margin-bottom: 24px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            color: var(--color-primary);
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1rem;
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            transition: var(--transition-smooth);
            border: 2px solid transparent;
        }

        .btn-download:hover {
            background: transparent;
            color: #fff;
            border-color: #fff;
        }

        .btn-download svg {
            width: 20px;
            height: 20px;
        }
    </style>
    <!-- Theme Flash Prevention -->
    <script id="theme-flash-prevention">
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
