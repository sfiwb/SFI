    <style>
        .links-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .links-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .links-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .links-section {
            padding: 60px 0;
        }

        .links-category {
            margin-bottom: 50px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--color-primary);
        }

        .category-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .category-header h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin: 0;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
        }

        .link-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 24px;
            transition: var(--transition-smooth);
            display: flex;
            align-items: flex-start;
            gap: 16px;
            text-decoration: none;
        }

        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .link-card-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .link-card-body h3 {
            font-size: 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin: 0 0 6px;
        }

        .link-card-body span {
            font-size: 0.82rem;
            color: var(--color-primary);
            font-family: 'Inter', sans-serif;
        }

        .link-card-body p {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin: 8px 0 0;
            font-family: var(--font-body);
            line-height: 1.5;
        }

        .link-arrow {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 1.2rem;
            align-self: center;
            flex-shrink: 0;
            transition: var(--transition-smooth);
        }

        .link-card:hover .link-arrow {
            color: var(--color-primary);
            transform: translateX(4px);
        }
    </style>
    <!-- Theme Flash Prevention -->
    <script id="theme-flash-prevention">
