    <style>
        /* Hero styling */
        .links-hero {
            position: relative;
            background: linear-gradient(135deg, #0c0d10 0%, #1a0c0e 50%, #0a0b12 100%);
            padding: 120px 0 80px;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            text-align: center;
        }
        .links-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 30%, rgba(227, 27, 35, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .links-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .links-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 650px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        .links-section {
            padding: 60px 0;
        }

        .links-category {
            margin-bottom: 60px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--color-primary);
        }

        .category-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .category-header h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin: 0;
            font-weight: 700;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 20px;
        }

        /* Accent variables for categories */
        .cat-scholarship {
            --card-glow-color: rgba(16, 185, 129, 0.06);
            --card-border-hover: #10b981;
            --card-glow-shadow: rgba(16, 185, 129, 0.15);
            --icon-bg: rgba(16, 185, 129, 0.12);
            --icon-color: #10b981;
        }
        .cat-education {
            --card-glow-color: rgba(59, 130, 246, 0.06);
            --card-border-hover: #3b82f6;
            --card-glow-shadow: rgba(59, 130, 246, 0.15);
            --icon-bg: rgba(59, 130, 246, 0.12);
            --icon-color: #3b82f6;
        }
        .cat-job {
            --card-glow-color: rgba(245, 158, 11, 0.06);
            --card-border-hover: #f59e0b;
            --card-glow-shadow: rgba(245, 158, 11, 0.15);
            --icon-bg: rgba(245, 158, 11, 0.12);
            --icon-color: #f59e0b;
        }
        .cat-leftist {
            --card-glow-color: rgba(239, 68, 68, 0.06);
            --card-border-hover: #ef4444;
            --card-glow-shadow: rgba(239, 68, 68, 0.15);
            --icon-bg: rgba(239, 68, 68, 0.12);
            --icon-color: #ef4444;
        }
        .cat-party {
            --card-glow-color: rgba(220, 38, 38, 0.06);
            --card-border-hover: #dc2626;
            --card-glow-shadow: rgba(220, 38, 38, 0.15);
            --icon-bg: rgba(220, 38, 38, 0.12);
            --icon-color: #dc2626;
        }

        /* Premium Link Card */
        .link-card {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 18px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            overflow: hidden;
        }
        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--card-glow-color, rgba(227, 27, 35, 0.05)) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .link-card:hover {
            transform: translateY(-5px);
            border-color: var(--card-border-hover, var(--color-primary));
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35), 0 0 15px var(--card-glow-shadow, rgba(227, 27, 35, 0.15));
        }
        .link-card:hover::before {
            opacity: 1;
        }

        .link-card-icon-wrap {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            background: var(--icon-bg, rgba(255, 255, 255, 0.05));
            color: var(--icon-color, #fff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .link-card:hover .link-card-icon-wrap {
            transform: scale(1.1) rotate(5deg);
        }

        .link-card-body {
            flex: 1;
        }
        .link-card-body h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 4px;
            color: var(--text-primary);
            line-height: 1.4;
            font-family: var(--font-body);
        }
        .link-card-body .url-span {
            font-size: 0.78rem;
            color: var(--icon-color, var(--color-primary));
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 8px;
        }
        .link-card-body p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.6;
            font-family: var(--font-body);
        }
        .link-arrow-wrap {
            align-self: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .link-card:hover .link-arrow-wrap {
            color: var(--icon-color, var(--color-primary));
            transform: translateX(5px);
        }

        /* Filter Button Styles */
        .filter-btn {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 8px 22px;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-family: var(--font-body);
        }
        .filter-btn:hover {
            border-color: var(--color-primary);
            color: #fff;
            background: rgba(227, 27, 35, 0.05);
        }
        .filter-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(227, 27, 35, 0.35);
        }

        .no-links-found {
            text-align: center;
            padding: 70px 20px;
            display: none;
        }
        .no-links-found i {
            font-size: 3.5rem;
            color: var(--text-muted);
            opacity: 0.5;
            margin-bottom: 15px;
            display: block;
        }
    </style>
