    <style>
        .page-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        .page-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
            font-family: 'Noto Serif Bengali', serif;
            font-weight: 800;
        }
        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Premium Glow and Glassmorphism */
        .generator-card {
            background: rgba(20, 15, 16, 0.6) !important;
            border: 1px solid rgba(255, 45, 60, 0.15) !important;
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 45, 60, 0.05);
        }
        
        [data-theme="light"] .generator-card {
            background: rgba(255, 255, 255, 0.85) !important;
            border: 1px solid rgba(0, 0, 0, 0.06) !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }
        
        .preview-canvas-wrap {
            border: 1px solid rgba(255, 45, 60, 0.25) !important;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6), 0 0 25px rgba(255, 45, 60, 0.1) !important;
            background: rgba(0, 0, 0, 0.4) !important;
            transition: all 0.5s ease;
        }
        
        .preview-canvas-wrap.generated-shine {
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 45, 60, 0.3) !important;
            border-color: rgba(255, 45, 60, 0.5) !important;
            transform: scale(1.01);
        }

        /* High-visibility Premium Buttons */
        .submit-btn, #downloadCardBtn, #bottomDownloadCardBtn {
            background: linear-gradient(135deg, #ff2d3c 0%, #c81e2b 100%) !important;
            color: #ffffff !important;
            border: 2px solid rgba(255, 255, 255, 0.15) !important;
            padding: 14px 28px !important;
            border-radius: 50px !important;
            font-weight: 700 !important;
            font-size: 1.05rem !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 4px 15px rgba(255, 45, 60, 0.4) !important;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .submit-btn:hover, #downloadCardBtn:hover, #bottomDownloadCardBtn:hover {
            background: linear-gradient(135deg, #ff4c5a 0%, #ff2d3c 100%) !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 20px rgba(255, 45, 60, 0.6) !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
            color: #ffffff !important;
        }

        .submit-btn:active, #downloadCardBtn:active, #bottomDownloadCardBtn:active {
            transform: translateY(0) !important;
        }
    </style>
