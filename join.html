    <style>
        .contact-info-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-info-item {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .contact-info-icon {
            font-size: 1.4rem;
            color: var(--color-primary);
            background: rgba(255, 45, 60, 0.08);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-info-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .contact-info-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .map-container {
            margin-top: 30px;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            backdrop-filter: blur(25px);
            padding: 30px;
            text-align: center;
            box-shadow: var(--shadow-main);
        }

        .form-select {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            color: var(--text-main);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        [data-theme="light"] .form-select {
            background: rgba(0, 0, 0, 0.02);
            color: #0f172a;
        }

        .form-select:focus {
            border-color: var(--color-primary);
            background: rgba(255, 45, 60, 0.02);
        }

        option {
            background-color: var(--bg-main);
            color: var(--text-main);
        }
    </style>
</head>
