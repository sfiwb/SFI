    <style>
        .contact-info-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-info-item {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .contact-info-icon {
            font-size: 1.1rem;
            color: var(--color-primary);
            background: rgba(255, 45, 60, 0.08);
            border: 1px solid rgba(255, 45, 60, 0.15);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition-smooth);
        }

        .contact-info-item:hover .contact-info-icon {
            background: var(--color-primary);
            color: #ffffff;
            border-color: var(--color-primary);
            transform: scale(1.05);
        }

        .contact-info-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .contact-info-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .contact-info-text a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .contact-info-text a:hover {
            color: var(--color-primary);
            text-decoration: underline;
        }

        #office {
            background: rgba(20, 15, 16, 0.6) !important;
            border-color: rgba(211, 26, 39, 0.15) !important;
            box-shadow: var(--shadow-glow), var(--shadow-main);
        }

        [data-theme="light"] #office {
            background: rgba(255, 255, 255, 0.75) !important;
            border-color: rgba(0, 0, 0, 0.06) !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        .right-info-column {
            display: flex;
            flex-direction: column;
            gap: 32px;
            margin: 0;
            padding: 0;
        }

        @media (min-width: 992px) {
            .right-info-column {
                height: 100%;
            }
            .right-info-column .card {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                margin: 0 !important;
            }
        }

        .map-wrapper {
            width: 100%;
            flex: 1;
            min-height: 280px;
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-top: 24px;
            position: relative;
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            filter: grayscale(1) invert(0.9) contrast(1.2);
            transition: var(--transition-smooth);
        }

        [data-theme="light"] .map-wrapper iframe {
            filter: none;
        }

        .map-wrapper iframe:hover {
            filter: none;
        }

        .form-select {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            color: var(--text-main);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        [data-theme="light"] .form-select {
            background: rgba(0, 0, 0, 0.02);
            color: #0f172a;
        }

        .form-select:focus {
            border-color: var(--color-primary);
            background: rgba(255, 45, 60, 0.02);
        }

        option {
            background-color: var(--bg-main);
            color: var(--text-main);
        }
    </style>
    <!-- Theme Flash Prevention -->
    <script id="theme-flash-prevention">

            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
