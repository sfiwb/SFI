    <style>
        .page-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .page-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 50px;
            padding: 50px 0 70px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .contact-layout {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }

        .contact-info-block h2 {
            font-size: 1.4rem;
            color: var(--color-primary);
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 22px;
        }

        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(211, 26, 39, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            border: 1px solid rgba(211, 26, 39, 0.25);
        }

        .info-text h4 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-text p {
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .info-text a {
            color: var(--color-accent);
            text-decoration: none;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        .divider-line {
            height: 3px;
            width: 50px;
            background: var(--color-primary);
            border-radius: 2px;
            margin-bottom: 26px;
        }

        /* Contact Form */
        .contact-form-block {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 36px 32px;
        }

        .contact-form-block h2 {
            font-size: 1.4rem;
            color: var(--color-primary);
            margin-bottom: 6px;
        }

        .contact-form-block .form-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-bottom: 7px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-body, #0c0d10);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(211, 26, 39, 0.12);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: var(--font-body);
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .submit-btn:hover {
            background: #b8151f;
            transform: translateY(-1px);
        }

        .social-links-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .social-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition-smooth);
        }

        .social-chip:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
    </style>
    <!-- Theme Flash Prevention -->

            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
