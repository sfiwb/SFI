    <style>
        /* ── Hero ── */
        .press-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .press-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .press-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── Press Cards Grid ── */
        .press-section {
            padding: 60px 0;
        }

        .press-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            padding-bottom: 20px;
        }

        .press-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 28px 26px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .press-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--color-primary);
            border-radius: 4px 0 0 4px;
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .press-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .press-card:hover::before {
            opacity: 1;
        }

        /* Date badge */
        .press-date-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(211, 26, 39, 0.12);
            color: var(--color-primary);
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(211, 26, 39, 0.25);
            width: fit-content;
            letter-spacing: 0.02em;
        }

        .press-date-badge svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        /* Card title */
        .press-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.55;
            color: var(--text-primary);
            margin: 0;
        }

        /* Card excerpt */
        .press-card-excerpt {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin: 0;
            flex: 1;
        }

        /* Tag */
        .press-tag {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--color-accent);
            background: rgba(255, 189, 9, 0.1);
            border: 1px solid rgba(255, 189, 9, 0.25);
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* Read more button */
        .press-read-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 20px;
            border-radius: var(--border-radius-sm);
            background: var(--color-primary);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: var(--font-body);
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            width: fit-content;
            margin-top: 4px;
        }

        .press-read-btn:hover {
            background: #b8161f;
            transform: translateX(2px);
        }

        .press-read-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Section heading */
        .section-heading-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .section-heading-row h2 {
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            color: var(--text-primary);
            position: relative;
            padding-bottom: 10px;
        }

        .section-heading-row h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: var(--color-primary);
            border-radius: 2px;
        }

        .press-count-badge {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 4px 14px;
            border-radius: 30px;
        }

        /* No more divider */
        .press-divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 14px 0 0;
        }

        /* Pagination stub */
        .press-pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 52px;
        }

        .press-page-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.88rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .press-page-btn.active,
        .press-page-btn:hover {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }

        @media (max-width: 600px) {
            .press-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
