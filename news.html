    <style>
        /* ── Hero ── */
        .news-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .news-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 14px;
        }

        .news-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── Filter Bar ── */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px 0 28px;
        }

        .filter-btn {
            padding: 8px 22px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }

        /* ── News Grid ── */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
            padding: 10px 0 70px;
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── News Card ── */
        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        /* Coloured top stripe per category */
        .news-card-stripe {
            height: 4px;
            background: var(--color-primary);
            flex-shrink: 0;
        }

        .news-card-stripe.cat-blue {
            background: #3b82f6;
        }

        .news-card-stripe.cat-green {
            background: #22c55e;
        }

        .news-card-stripe.cat-red {
            background: var(--color-primary);
        }

        .news-card-body {
            padding: 22px 24px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Meta row */
        .news-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .news-date {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-family: var(--font-body);
        }

        .news-tag {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            padding: 3px 10px;
            border-radius: 20px;
            font-family: var(--font-body);
        }

        .news-tag.tag-red {
            background: rgba(211, 26, 39, 0.15);
            color: #f87171;
            border: 1px solid rgba(211, 26, 39, 0.35);
        }

        .news-tag.tag-blue {
            background: rgba(59, 130, 246, 0.12);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .news-tag.tag-green {
            background: rgba(34, 197, 94, 0.12);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        /* Card content */
        .news-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.55;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .news-card-excerpt {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.7;
            font-family: var(--font-body);
            flex: 1;
            margin-bottom: 20px;
        }

        /* Read more button */
        .news-read-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-primary);
            text-decoration: none;
            border: 1px solid var(--color-primary);
            border-radius: 6px;
            padding: 7px 16px;
            align-self: flex-start;
            transition: var(--transition-smooth);
            font-family: var(--font-body);
        }

        .news-read-btn:hover {
            background: var(--color-primary);
            color: #fff;
        }

        .news-read-btn svg {
            transition: transform 0.2s;
        }

        .news-read-btn:hover svg {
            transform: translateX(3px);
        }

        /* ── Empty state ── */
        .news-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            display: none;
            grid-column: 1 / -1;
        }

        .news-empty svg {
            opacity: 0.3;
            margin-bottom: 16px;
        }
    </style>
