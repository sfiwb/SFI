    <!-- Main Stylesheets -->
    
    
    <style>
        .links-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .links-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .links-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .links-section {
            padding: 60px 0;
        }

        .links-category {
            margin-bottom: 50px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--color-primary);
        }

        .category-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .category-header h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin: 0;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
        }

        .link-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 24px;
            transition: var(--transition-smooth);
            display: flex;
            align-items: flex-start;
            gap: 16px;
            text-decoration: none;
        }

        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .link-card-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .link-card-body h3 {
            font-size: 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin: 0 0 6px;
        }

        .link-card-body span {
            font-size: 0.82rem;
            color: var(--color-primary);
            font-family: 'Inter', sans-serif;
        }

        .link-card-body p {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin: 8px 0 0;
            font-family: var(--font-body);
            line-height: 1.5;
        }

        .link-arrow {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 1.2rem;
            align-self: center;
            flex-shrink: 0;
            transition: var(--transition-smooth);
        }

        .link-card:hover .link-arrow {
            color: var(--color-primary);
            transform: translateX(4px);
        }

        /* Interactive District Map Styles */
        .map-wrapper {
            position: relative;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius-md);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wb-map-svg {
            max-height: 600px;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
        }

        .wb-district-path {
            fill: #24252a;
            stroke: #0c0d10;
            stroke-width: 1.2px;
            transition: fill 0.25s ease, stroke 0.25s ease, filter 0.25s ease;
        }

        .wb-district-path:hover {
            fill: rgba(227, 27, 35, 0.7) !important;
            stroke: #ffffff;
            stroke-width: 1.5px;
            filter: drop-shadow(0 0 8px rgba(227, 27, 35, 0.8));
        }

        .wb-district-path.active {
            fill: var(--color-primary) !important;
            stroke: #ffffff;
            stroke-width: 2px;
            filter: drop-shadow(0 0 12px rgba(227, 27, 35, 0.9));
        }

        /* Dynamic form select & control custom styling for both themes */
        .glass-card select.form-select, 
        .glass-card input.form-control,
        .glass-card textarea.form-control {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: var(--text-primary, #ffffff) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }
        
        /* Light theme adjustments for helpdesk form controls */
        html[data-theme="light"] .glass-card select.form-select,
        html[data-theme="light"] .glass-card input.form-control,
        html[data-theme="light"] .glass-card textarea.form-control {
            background-color: rgba(0, 0, 0, 0.03) !important;
            color: #111111 !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
        }

        /* Options inside dropdown should have legible backgrounds on both themes */
        .glass-card select.form-select option {
            background-color: #1a1b20 !important;
            color: #ffffff !important;
        }

        html[data-theme="light"] .glass-card select.form-select option {
            background-color: #ffffff !important;
            color: #111111 !important;
        }
        
        .glass-card select.form-select:focus,
        .glass-card input.form-control:focus,
        .glass-card textarea.form-control:focus {
            background-color: rgba(255, 255, 255, 0.08) !important;
            border-color: var(--color-primary, #ff2d3c) !important;
            box-shadow: 0 0 10px rgba(255, 45, 60, 0.2) !important;
            color: var(--text-primary, #ffffff) !important;
        }

        html[data-theme="light"] .glass-card select.form-select:focus,
        html[data-theme="light"] .glass-card input.form-control:focus,
        html[data-theme="light"] .glass-card textarea.form-control:focus {
            background-color: rgba(0, 0, 0, 0.01) !important;
            border-color: var(--color-primary, #ff2d3c) !important;
            box-shadow: 0 0 10px rgba(255, 45, 60, 0.15) !important;
            color: #111111 !important;
        }

        /* Dynamic Theme Styling for Modals */
        .modal-content {
            background-color: #16171a !important;
            color: #ffffff !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }

        .modal-header, .modal-footer {
            border-color: rgba(255, 255, 255, 0.08) !important;
        }

        /* Inner wrappers inside modals */
        .modal-body .bg-black.bg-opacity-20,
        .modal-body .bg-dark.bg-opacity-25 {
            background-color: rgba(255, 255, 255, 0.03) !important;
            border-color: rgba(255, 255, 255, 0.08) !important;
            color: #ffffff !important;
        }

        .modal-body h4, 
        .modal-body h5, 
        .modal-body h6,
        .modal-body div,
        .modal-body span:not(.badge),
        .modal-header .modal-title {
            color: #ffffff !important;
        }

        .modal-body .text-muted {
            color: #a0a0a5 !important;
        }

        /* Light Theme Modals Override */
        html[data-theme="light"] .modal-content {
            background-color: #ffffff !important;
            color: #1a1a2e !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1) !important;
        }

        html[data-theme="light"] .modal-header, 
        html[data-theme="light"] .modal-footer {
            border-color: rgba(0, 0, 0, 0.06) !important;
        }

        html[data-theme="light"] .modal-body .bg-black.bg-opacity-20,
        html[data-theme="light"] .modal-body .bg-dark.bg-opacity-25 {
            background-color: rgba(0, 0, 0, 0.02) !important;
            border-color: rgba(0, 0, 0, 0.06) !important;
            color: #1a1a2e !important;
        }

        html[data-theme="light"] .modal-body h4, 
        html[data-theme="light"] .modal-body h5, 
        html[data-theme="light"] .modal-body h6,
        html[data-theme="light"] .modal-body div,
        html[data-theme="light"] .modal-body span:not(.badge),
        html[data-theme="light"] .modal-header .modal-title {
            color: #1a1a2e !important;
        }

        html[data-theme="light"] .modal-body .text-muted {
            color: #6c757d !important;
        }

        html[data-theme="light"] .modal-header .btn-close {
            filter: none !important; /* Make close button dark in light theme */
        }
    </style>
