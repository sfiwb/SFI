    <!-- Main Stylesheets -->
    
    
    <style>
        /* Hero Overrides */
        .about-hero {
            background: linear-gradient(135deg, var(--background-color) 0%, color-mix(in srgb, var(--accent-color), transparent 94%) 100%) !important;
            padding: 120px 0 70px !important;
            text-align: center;
            border-bottom: 1px solid var(--surface-border) !important;
            position: relative;
        }

        .about-hero h1 {
            font-size: clamp(2.2rem, 6vw, 3.5rem);
            color: var(--accent-color) !important;
            font-family: var(--font-heading) !important;
            font-weight: 800;
            margin-bottom: 12px;
            text-shadow: 0 0 15px var(--accent-glow) !important;
        }

        .about-hero p {
            color: var(--text-muted) !important;
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Ideology Section */
        .ideology-banner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .ideology-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 40px 30px;
            text-align: center;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ideology-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-color);
            opacity: 0.8;
        }

        .ideology-card.accent-gold::before {
            background: var(--color-accent);
        }

        .ideology-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .ideology-card h3 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-top: 15px;
            margin-bottom: 15px;
            font-family: var(--font-heading) !important;
        }

        .ideology-card p {
            font-size: 0.95rem;
            line-height: 1.65;
            color: var(--text-muted);
            margin: 0;
        }

        .ideology-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 30, 56, 0.08);
            border: 1px solid rgba(255, 30, 56, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--accent-color);
            box-shadow: 0 0 15px rgba(255, 30, 56, 0.1);
        }

        .ideology-card.accent-gold .ideology-icon {
            background: rgba(255, 234, 0, 0.08);
            border-color: rgba(255, 234, 0, 0.25);
            color: var(--color-accent);
            box-shadow: 0 0 15px rgba(255, 234, 0, 0.1);
        }

        /* Timeline Section */
        .timeline-section {
            position: relative;
            padding: 80px 0;
        }

        .timeline-container {
            position: relative;
            max-width: 1000px;
            margin: 40px auto 0;
        }

        .timeline-container::after {
            content: '';
            position: absolute;
            width: 4px;
            background: linear-gradient(to bottom, var(--accent-color) 0%, var(--color-accent) 50%, var(--accent-color) 100%);
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -2px;
            border-radius: 2px;
        }

        .timeline-item {
            padding: 10px 40px;
            position: relative;
            background-color: inherit;
            width: 50%;
            box-sizing: border-box;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            right: -10px;
            background-color: var(--background-color);
            border: 4px solid var(--accent-color);
            top: 25px;
            border-radius: 50%;
            z-index: 1;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .timeline-item.left {
            left: 0;
            text-align: right;
        }

        .timeline-item.right {
            left: 50%;
        }

        .timeline-item.right::after {
            left: -10px;
        }

        .timeline-item:hover::after {
            transform: scale(1.3);
            border-color: var(--color-accent);
            box-shadow: 0 0 15px rgba(255, 234, 0, 0.6);
        }

        .timeline-item-content {
            padding: 25px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            position: relative;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .timeline-item:hover .timeline-item-content {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-glow);
            transform: translateY(-3px);
        }

        .timeline-year {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 8px;
            display: inline-block;
            font-family: var(--font-heading) !important;
        }

        .timeline-item.right .timeline-year {
            color: var(--color-accent);
        }

        .timeline-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--heading-color);
        }

        .timeline-desc {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* Responsive Grid & Text Styles */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .info-content h3 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 20px;
            position: relative;
        }

        .info-content h3::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 60px;
            height: 3px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        .info-content.align-right h3::after {
            left: auto;
            right: 0;
        }

        .info-text {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
        }

        /* Accent Boxes and Modern Phase Cards */
        .modern-phase-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 30px;
        }

        .modern-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 24px;
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .modern-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-glow);
        }

        .modern-card-badge {
            background: rgba(255, 30, 56, 0.08);
            border: 1px solid rgba(255, 30, 56, 0.2);
            color: var(--accent-color);
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            align-self: flex-start;
            margin-bottom: 15px;
        }

        .modern-card h4 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .modern-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 0;
            flex-grow: 1;
        }

        /* Martyr Highlight Callout */
        .martyr-callout {
            background: linear-gradient(135deg, rgba(255, 30, 56, 0.04) 0%, rgba(0, 0, 0, 0.2) 100%);
            border: 1px solid rgba(255, 30, 56, 0.2);
            border-left: 5px solid var(--accent-color);
            border-radius: var(--border-radius-md);
            padding: 30px;
            margin-top: 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .martyr-callout::before {
            content: '★';
            position: absolute;
            right: 15px;
            bottom: -20px;
            font-size: 8rem;
            color: var(--accent-color);
            opacity: 0.04;
            pointer-events: none;
        }

        .martyr-icon {
            font-size: 3rem;
            color: var(--accent-color);
            animation: pulse-shadow 2s infinite;
        }

        .martyr-text h4 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--heading-color);
        }

        .martyr-text p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Organizational Structure Cards */
        .structure-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 30px;
        }

        .structure-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 32px 24px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }

        .structure-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-glow);
        }

        .structure-level {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 12px;
            font-family: var(--font-heading) !important;
        }

        .structure-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .structure-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 0;
        }

        /* Media Queries for timeline and layout */
        @media (max-width: 992px) {
            .ideology-banner {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .modern-phase-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .structure-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .timeline-container::after {
                left: 31px;
            }

            .timeline-item {
                width: 100%;
                padding-left: 70px;
                padding-right: 25px;
            }

            .timeline-item.left {
                text-align: left;
                left: 0;
            }

            .timeline-item::after {
                left: 21px;
                right: auto;
            }

            .timeline-item.right::after {
                left: 21px;
            }

            .timeline-item.right {
                left: 0;
            }

            .martyr-callout {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
        }

        @keyframes pulse-shadow {
            0% {
                transform: scale(1);
                text-shadow: 0 0 0 rgba(255, 30, 56, 0.4);
            }

            70% {
                transform: scale(1.05);
                text-shadow: 0 0 15px rgba(255, 30, 56, 0.7);
            }

            100% {
                transform: scale(1);
                text-shadow: 0 0 0 rgba(255, 30, 56, 0.4);
            }
        }
    </style>
