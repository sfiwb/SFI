    <!-- Main Stylesheets -->
    
    
    <style>
        .gallery-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .gallery-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .gallery-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px 0 20px;
        }

        .filter-btn {
            padding: 8px 22px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 0 60px;
        }

        .photo-card {
            border-radius: var(--border-radius-md);
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: var(--transition-smooth);
        }

        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .photo-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 16px;
        }

        .photo-info h3 {
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .photo-info span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .photo-placeholder {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #1a0a0a, #0c0d10);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            font-size: 3rem;
        }

        .photo-placeholder small {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-family: var(--font-body);
        }
    </style>
