    <style>
        .donate-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .donate-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .donate-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 640px;
            margin: 0 auto;
        }

        .donate-section {
            padding: 70px 0;
        }

        .donate-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .donate-layout {
                grid-template-columns: 1fr;
            }
        }

        y

        /* Amount selector */
        .donate-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 32px;
        }

        .donate-box h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin-bottom: 8px;
        }

        .donate-box .sub {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            margin-bottom: 24px;
        }

        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .amount-btn {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-primary);
            transition: var(--transition-smooth);
        }

        .amount-btn:hover,
        .amount-btn.selected {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
        }

        .amount-btn span {
            display: block;
            font-size: 0.75rem;
            color: inherit;
            opacity: 0.8;
            margin-top: 2px;
            font-family: 'Inter', sans-serif;
        }

        .custom-amount-wrap {
            margin-bottom: 24px;
        }

        .custom-amount-wrap label {
            display: block;
            font-size: 0.88rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            margin-bottom: 8px;
        }

        .custom-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition-smooth);
            box-sizing: border-box;
        }

        .custom-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(211, 26, 39, 0.1);
        }

        .btn-donate-now {
            display: block;
            width: 100%;
            background: var(--color-primary);
            color: #fff;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1.05rem;
            padding: 15px;
            border-radius: var(--border-radius-sm);
            border: none;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-align: center;
        }

        .btn-donate-now:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(211, 26, 39, 0.4);
        }

        .secure-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: var(--font-body);
        }

        /* Bank transfer */
        .bank-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 32px;
        }

        .bank-box h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin-bottom: 20px;
        }

        .bank-detail {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        .bank-detail:last-of-type {
            border-bottom: none;
        }

        .bank-detail-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            flex-shrink: 0;
        }

        .bank-detail-value {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-align: right;
        }

        .qr-section {
            margin-top: 24px;
            text-align: center;
        }

        .qr-section h3 {
            font-size: 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin-bottom: 14px;
        }

        .qr-placeholder {
            width: 160px;
            height: 160px;
            background: #fff;
            border-radius: 12px;
            margin: 0 auto 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border-color);
        }

        .qr-placeholder svg {
            width: 80px;
            height: 80px;
            opacity: 0.3;
        }

        .qr-placeholder small {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            margin-top: 6px;
            display: block;
        }

        .qr-upi-id {
            font-size: 0.85rem;
            color: var(--color-primary);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        /* Why donate */
        .why-section {
            padding: 0 0 70px;
        }

        .why-section h2 {
            font-size: 1.6rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            text-align: center;
            margin-bottom: 36px;
        }

        .why-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .why-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 28px 24px;
            text-align: center;
            transition: var(--transition-smooth);
        }

        .why-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .why-icon {
            font-size: 2.5rem;
            margin-bottom: 14px;
            display: block;
        }

        .why-card h3 {
            font-size: 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin-bottom: 10px;
        }

        .why-card p {
            font-size: 0.88rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            line-height: 1.6;
        }
    </style>
    <!-- Theme Flash Prevention -->
    <script id="theme-flash-prevention">
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
