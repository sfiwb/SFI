    <style>
        /* Archive Controls Styling */
        .archive-controls {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 32px;
            margin-bottom: 48px;
            box-shadow: var(--shadow-main);
            position: relative;
            z-index: 10;
        }

        .archive-filters-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            align-items: center;
        }

        .search-input-wrap {
            position: relative;
            width: 100%;
        }

        .search-input-wrap input {
            width: 100%;
            padding: 14px 20px 14px 46px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: var(--border-radius-sm);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        .search-input-wrap input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(211, 26, 39, 0.15);
        }

        .search-icon-svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 18px;
            height: 18px;
        }

        .select-input-wrap {
            position: relative;
            width: 100%;
        }

        .select-input-wrap select {
            width: 100%;
            padding: 14px 40px 14px 20px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: var(--border-radius-sm);
            font-size: 0.95rem;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .select-input-wrap select:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(211, 26, 39, 0.15);
        }

        .select-arrow-svg {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 16px;
            height: 16px;
        }

        .archive-status-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .archive-count {
            font-family: var(--font-heading);
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        @media (max-width: 992px) {
            .archive-filters-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .archive-controls {
                padding: 24px;
            }
        }
    </style>
