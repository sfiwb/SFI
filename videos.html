    <style>
        /* ── Video Hero ── */
        .video-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 50%, #0d0a1a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .video-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 120%, rgba(211, 26, 39, 0.12) 0%, transparent 65%);
            pointer-events: none;
        }

        .video-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
            position: relative;
        }

        .video-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 640px;
            margin: 0 auto;
            position: relative;
        }

        /* ── Filter Bar ── */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px 0 20px;
        }

        .filter-btn {
            padding: 8px 22px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }

        /* ── Video Grid ── */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding: 20px 0 60px;
        }

        /* ── Video Card ── */
        .video-card {
            border-radius: var(--border-radius-md);
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        /* ── Thumbnail / Play Button ── */
        .video-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            cursor: pointer;
            overflow: hidden;
        }

        .video-thumb-bg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Individual gradient themes per card */
        .grad-speech {
            background: linear-gradient(135deg, #1a0000 0%, #3d0a0a 40%, #1a0a24 100%);
        }

        .grad-protest {
            background: linear-gradient(135deg, #0a1a00 0%, #1a2d0a 40%, #0d1a0d 100%);
        }

        .grad-interview {
            background: linear-gradient(135deg, #00101a 0%, #0a1e33 40%, #0d0d1a 100%);
        }

        .grad-conference {
            background: linear-gradient(135deg, #1a100a 0%, #2d1a00 40%, #1a0a10 100%);
        }

        .grad-protest2 {
            background: linear-gradient(135deg, #120012 0%, #2a0029 40%, #0d0010 100%);
        }

        .grad-speech2 {
            background: linear-gradient(135deg, #001a10 0%, #003320 40%, #00100a 100%);
        }

        /* Decorative pattern overlay */
        .video-thumb-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(-45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 1px, transparent 1px, transparent 12px);
        }

        /* SFI logo watermark in thumbnail */
        .thumb-watermark {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(211, 26, 39, 0.85);
            color: #fff;
            font-size: 0.65rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Duration badge */
        .thumb-duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.82);
            color: #fff;
            font-size: 0.72rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 4px;
        }

        /* YouTube-style red play button */
        .play-btn {
            position: relative;
            z-index: 2;
            width: 64px;
            height: 44px;
            background: #ff0000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 4px 24px rgba(255, 0, 0, 0.45);
        }

        .video-thumb:hover .play-btn {
            transform: scale(1.12);
            background: #cc0000;
        }

        .play-btn svg {
            width: 22px;
            height: 22px;
            fill: #fff;
            margin-left: 4px;
        }

        /* ── Card Info ── */
        .video-info {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .video-category-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            background: rgba(211, 26, 39, 0.15);
            color: var(--color-primary);
            font-size: 0.72rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            border: 1px solid rgba(211, 26, 39, 0.25);
            align-self: flex-start;
        }

        .video-info h3 {
            font-size: 1rem;
            line-height: 1.5;
            margin: 0;
            color: var(--text-primary);
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: auto;
        }

        .video-meta span {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .video-meta .dot-sep {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-muted);
            opacity: 0.5;
        }

        /* ── Section heading accent ── */
        .section-accent-line {
            width: 48px;
            height: 4px;
            background: var(--color-primary);
            border-radius: 2px;
            margin: 0 auto 24px;
        }

        /* ── Load more button ── */
        .load-more-wrap {
            text-align: center;
            padding: 10px 0 60px;
        }

        .btn-load-more {
            padding: 12px 36px;
            border-radius: 30px;
            border: 1px solid var(--color-primary);
            background: transparent;
            color: var(--color-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-load-more:hover {
            background: var(--color-primary);
            color: #fff;
        }

        /* ── CTA Banner ── */
        .video-cta {
            background: linear-gradient(135deg, rgba(211, 26, 39, 0.1) 0%, rgba(255, 189, 9, 0.06) 100%);
            border: 1px solid rgba(211, 26, 39, 0.2);
            border-radius: var(--border-radius-md);
            padding: 40px 32px;
            text-align: center;
            margin-bottom: 60px;
        }

        .video-cta h3 {
            font-size: 1.4rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .video-cta p {
            color: var(--text-muted);
            margin-bottom: 20px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
