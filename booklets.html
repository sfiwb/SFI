        }

        .booklet-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .booklet-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .booklet-cover {
            height: 180px;
            background: linear-gradient(135deg, #1a0a0a 0%, #0c0d10 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        .booklet-cover::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 70%, rgba(211, 26, 39, 0.15) 0%, transparent 60%);
        }

        .booklet-cover-emoji {
            font-size: 4rem;
            position: relative;
            z-index: 1;
        }

        .booklet-cover-stripe {
            position: absolute;
            left: 0;
            top: 0;
            width: 5px;
            height: 100%;
            background: var(--color-primary);
        }

        .booklet-tag {
            position: absolute;
            top: 14px;
            right: 14px;
            background: var(--color-primary);
            color: #fff;
            font-size: 0.72rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .booklet-body {
            padding: 20px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .booklet-body h3 {
            font-size: 1.05rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .booklet-body p {
            font-size: 0.88rem;
            color: var(--text-muted);
            font-family: var(--font-body);
            line-height: 1.6;
            flex: 1;
            margin-bottom: 18px;
        }

        .booklet-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .booklet-meta span {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .btn-dl {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--color-primary);
            color: #fff;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 11px 20px;
            border-radius: var(--border-radius-sm);
            text-decoration: none;
            transition: var(--transition-smooth);
            border: none;
            cursor: pointer;
        }

        .btn-dl:hover {
            background: #b91c1c;
            transform: translateY(-1px);
        }

        .btn-dl svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
    </style>
</head>
