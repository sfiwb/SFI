name: Deploy Obfuscated Static Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Obfuscation Build
        run: |
          python obfuscator.py

      - name: Clean Sensitive Source Files for Deployment
        run: |
          # Remove original unobfuscated source code folder
          rm -rf backup_original_code
          # Remove developer scripts and local configurations
          rm -rf obfuscator.py recover.py update_all.py build_search_system.py
          rm -rf inspect_js.py inspect_sticky.py inspect_zindex.py inspect_header_css.py
          rm -rf .git .github .vscode
          # Remove development documentation
          rm -rf README.md CONTRIBUTING.md CODE_OF_CONDUCT.md LICENSE SECURITY.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
