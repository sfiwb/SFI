    <!-- Main Stylesheets -->
    
    
    <style>
        .page-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .page-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .notice-banner {
            background: var(--bg-card);
            border: 1px solid var(--color-accent);
            border-radius: var(--border-radius-md);
            padding: 18px 24px;
            margin: 40px 0 30px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--color-accent);
            font-size: 1rem;
        }

        .notice-banner span.icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .leadership-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .leader-card {
            background: linear-gradient(135deg, var(--color-primary) 0%, #7c0000 100%);
            border-radius: var(--border-radius-md);
            padding: 32px 28px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .leader-card::before {
            content: '★';
            position: absolute;
            top: -10px;
            right: 10px;
            font-size: 5rem;
            opacity: 0.12;
        }

        .leader-card .lc-role {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.85;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .leader-card .lc-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .leader-card .lc-org {
            font-size: 0.85rem;
            opacity: 0.75;
        }

        [data-theme="light"] .leader-card {
            color: var(--text-primary);
        }
        [data-theme="light"] .leader-card .lc-org {
            color: var(--text-secondary);
        }

        .members-table-wrap {
            overflow-x: auto;
            margin: 10px 0 60px;
        }

        .members-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .members-table thead tr {
            background: var(--color-primary);
            color: #fff;
        }

        .members-table th {
            padding: 14px 18px;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .members-table td {
            padding: 14px 18px;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .members-table tbody tr:last-child td {
            border-bottom: none;
        }

        .members-table tbody tr:hover {
            background: var(--bg-hover, rgba(211, 26, 39, 0.07));
        }

        .members-table td .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(211, 26, 39, 0.15);
            color: var(--color-primary);
            border: 1px solid rgba(211, 26, 39, 0.3);
        }

        .serial {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .section-title {
            font-size: 1.6rem;
            color: var(--color-primary);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .divider-line {
            height: 3px;
            width: 60px;
            background: var(--color-primary);
            border-radius: 2px;
            margin-bottom: 30px;
        }

        /* District Map & Interactivity styles */
        :root {
            --map-fill: #2a2c35;
            --map-stroke: #111318;
            --bg-section: linear-gradient(180deg, #0c0d10 0%, #15161b 100%);
            --map-wrapper-bg: rgba(0, 0, 0, 0.2);
        }
        [data-theme="light"] {
            --map-fill: #cbd5e1;
            --map-stroke: #94a3b8;
            --bg-section: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
            --map-wrapper-bg: rgba(255, 255, 255, 0.5);
        }

        .map-section {
            padding: 60px 0;
            background: var(--bg-section);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .map-wrapper {
            position: relative;
            background: var(--map-wrapper-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wb-map-svg {
            max-height: 600px;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
        }

        .wb-district-path {
            fill: var(--map-fill);
            stroke: var(--map-stroke);
            stroke-width: 1.2px;
            transition: fill 0.25s ease, stroke 0.25s ease, filter 0.25s ease;
        }

        .wb-district-path:hover {
            fill: rgba(227, 27, 35, 0.7) !important;
            stroke: #ffffff;
            stroke-width: 1.5px;
            filter: drop-shadow(0 0 8px rgba(227, 27, 35, 0.8));
        }

        .wb-district-path.active {
            fill: var(--color-primary) !important;
            stroke: #ffffff;
            stroke-width: 2px;
            filter: drop-shadow(0 0 12px rgba(227, 27, 35, 0.9));
        }

        .leader-phone-row {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .phone-number {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .btn-call {
            margin-left: auto;
            font-size: 0.8rem;
            background: rgba(211, 26, 39, 0.1);
            color: var(--color-primary) !important;
            border: 1px solid rgba(211, 26, 39, 0.2);
            padding: 4px 10px;
            border-radius: var(--border-radius-sm);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-smooth);
        }

        .btn-call:hover {
            background: var(--color-primary);
            color: #ffffff !important;
            border-color: var(--color-primary);
            transform: translateY(-1px);
        }

        .btn-whatsapp {
            font-size: 0.8rem;
            background: rgba(37, 211, 102, 0.08);
            color: #25d366 !important;
            border: 1px solid rgba(37, 211, 102, 0.2);
            padding: 4px 10px;
            border-radius: var(--border-radius-sm);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-smooth);
        }

        .btn-whatsapp:hover {
            background: #25d366;
            color: #ffffff !important;
            border-color: #25d366;
            transform: translateY(-1px);
        }
        
        [data-theme="light"] .btn-whatsapp {
            background: rgba(37, 211, 102, 0.05);
        }
        [data-theme="light"] .btn-whatsapp:hover {
            background: #25d366;
            color: #ffffff !important;
        }

        .btn-copy {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-smooth);
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            transform: translateY(-1px);
        }

        .btn-copy.copied {
            background: #10b981 !important;
            color: #ffffff !important;
            border-color: #10b981 !important;
        }
        
        [data-theme="light"] .btn-copy {
            background: rgba(0, 0, 0, 0.03);
        }
        [data-theme="light"] .btn-copy:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .district-info-details {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-detail-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .info-detail-item i {
            color: var(--color-primary);
            font-size: 1.1rem;
            margin-top: 3px;
        }

        .info-detail-item div {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-detail-item .detail-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .info-detail-item .detail-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .info-detail-item a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .info-detail-item a:hover {
            color: var(--color-primary-hover);
            text-decoration: underline;
        }

        .info-panel-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 35px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-panel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--color-primary);
        }

        .info-placeholder {
            text-align: center;
            padding: 40px 20px;
        }

        .info-placeholder-icon {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }

        .info-content {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .district-title-bn {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--color-primary);
            margin-bottom: 4px;
            font-family: 'Noto Serif Bengali', serif;
        }

        .district-title-en {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .leaders-list {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .leader-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius-sm);
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .leader-item .role {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--color-primary);
            font-weight: 700;
            letter-spacing: 0.8px;
        }

        .leader-item .name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .contact-details {
            margin-bottom: 24px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-details div {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            color: var(--text-muted);
        }

        .contact-details i {
            color: var(--color-primary);
            margin-top: 3px;
        }

        .district-social-links {
            display: flex;
            gap: 10px;
        }

        .district-social-links a {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .district-social-links a:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #ffffff;
            transform: translateY(-2px);
        }
    </style>
    <!-- Theme Flash Prevention -->
    <script id="theme-flash-prevention">
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
