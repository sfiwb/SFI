    <style>
        .page-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .page-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .notice-banner {
            background: var(--bg-card);
            border: 1px solid var(--color-accent);
            border-radius: var(--border-radius-md);
            padding: 18px 24px;
            margin: 40px 0 30px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--color-accent);
            font-size: 1rem;
        }

        .notice-banner span.icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .leadership-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .leader-card {
            background: linear-gradient(135deg, var(--color-primary) 0%, #7c0000 100%);
            border-radius: var(--border-radius-md);
            padding: 32px 28px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .leader-card::before {
            content: '★';
            position: absolute;
            top: -10px;
            right: 10px;
            font-size: 5rem;
            opacity: 0.12;
        }

        .leader-card .lc-role {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.85;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .leader-card .lc-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .leader-card .lc-org {
            font-size: 0.85rem;
            opacity: 0.75;
        }

        .members-table-wrap {
            overflow-x: auto;
            margin: 10px 0 60px;
        }

        .members-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .members-table thead tr {
            background: var(--color-primary);
            color: #fff;
        }

        .members-table th {
            padding: 14px 18px;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .members-table td {
            padding: 14px 18px;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .members-table tbody tr:last-child td {
            border-bottom: none;
        }

        .members-table tbody tr:hover {
            background: var(--bg-hover, rgba(211, 26, 39, 0.07));
        }

        .members-table td .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(211, 26, 39, 0.15);
            color: var(--color-primary);
            border: 1px solid rgba(211, 26, 39, 0.3);
        }

        .serial {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .section-title {
            font-size: 1.6rem;
            color: var(--color-primary);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .divider-line {
            height: 3px;
            width: 60px;
            background: var(--color-primary);
            border-radius: 2px;
            margin-bottom: 30px;
        }
    </style>
