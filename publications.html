    <!-- Main Stylesheets -->
    
    
    <style>
        /* ── Hero ── */
        .pub-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .pub-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .pub-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 620px;
            margin: 0 auto;
        }

        /* ── Section headings ── */
        .pub-section {
            padding: 60px 0;
        }

        .pub-section-title {
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            color: var(--color-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pub-section-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 36px;
        }

        .section-divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        /* ── Card grid ── */
        .pub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 24px;
        }

        /* ── Booklet card ── */
        .booklet-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 28px 24px 24px;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .booklet-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .booklet-icon {
            font-size: 2.4rem;
            line-height: 1;
        }

        .booklet-card h3 {
            font-size: 1.05rem;
            line-height: 1.5;
            margin: 0;
        }

        .booklet-card p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.65;
            flex: 1;
            margin: 0;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--border-radius-sm);
            padding: 10px 20px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            align-self: flex-start;
        }

        .btn-download:hover {
            background: #b5161f;
            transform: translateY(-1px);
        }

        /* ── Election card ── */
        .election-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 28px 24px 24px;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .election-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .election-badge {
            display: inline-block;
            background: var(--color-accent, #ffbd09);
            color: #1a0a0a;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 30px;
            align-self: flex-start;
        }

        .election-card h3 {
            font-size: 1.1rem;
            margin: 0;
        }

        .election-card p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.65;
            flex: 1;
            margin: 0;
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            border-radius: var(--border-radius-sm);
            padding: 9px 20px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition-smooth);
            align-self: flex-start;
        }

        .btn-outline:hover {
            background: var(--color-primary);
            color: #fff;
        }

        /* ── Links section ── */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .ext-link-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 24px 22px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: var(--transition-smooth);
            text-decoration: none;
            color: inherit;
        }

        .ext-link-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .ext-link-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .ext-link-info h4 {
            font-size: 1rem;
            margin: 0 0 6px;
        }

        .ext-link-info span {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .ext-link-arrow {
            margin-left: auto;
            color: var(--color-primary);
            font-size: 1.2rem;
            align-self: center;
            flex-shrink: 0;
        }
    </style>
    <!-- Theme Flash Prevention -->
    <script id="theme-flash-prevention">
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
