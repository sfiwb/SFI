    <style>
        .page-hero {
            background: linear-gradient(135deg, #0c0d10 0%, #1a0a0a 100%);
            padding: 100px 0 60px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .page-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-primary);
            margin-bottom: 12px;
        }

        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .notice-banner {
            background: var(--bg-card);
            border: 1px solid var(--color-accent);
            border-radius: var(--border-radius-md);
            padding: 18px 24px;
            margin: 40px 0 30px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--color-accent);
            font-size: 1rem;
        }

        .notice-banner span.icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            padding: 10px 0 60px;
        }

        .member-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 30px 24px;
            text-align: center;
            transition: var(--transition-smooth);
        }

        .member-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), #7c0000);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 2rem;
            color: #fff;
            border: 3px solid var(--border-color);
        }

        .member-card h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .member-card .role {
            font-size: 0.85rem;
            color: var(--color-accent);
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .member-card .org {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .section-title {
            font-size: 1.6rem;
            color: var(--color-primary);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .divider-line {
            height: 3px;
            width: 60px;
            background: var(--color-primary);
            border-radius: 2px;
            margin-bottom: 30px;
        }
    </style>
</head>
